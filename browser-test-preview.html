<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Compatibility Test Preview</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #2d3748;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .header p {
            color: #718096;
            font-size: 1.1rem;
        }
        .test-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto 30px;
        }
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .test-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .results {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }
        .results.show {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .browser-info {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .browser-info h3 {
            color: #2d3748;
            margin: 0 0 15px 0;
            font-size: 1.2rem;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .info-row:last-child {
            margin-bottom: 0;
        }
        .info-label {
            color: #4a5568;
            font-weight: 500;
        }
        .info-value {
            color: #2d3748;
            font-weight: 600;
        }
        .score {
            font-size: 1.5rem;
        }
        .score.excellent { color: #38a169; }
        .score.good { color: #d69e2e; }
        .score.fair { color: #dd6b20; }
        .score.poor { color: #e53e3e; }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .feature {
            background: #f7fafc;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
        }
        .feature-name {
            color: #4a5568;
            font-weight: 500;
        }
        .feature-status {
            font-weight: 600;
            font-size: 1.2rem;
        }
        .feature-status.supported { color: #38a169; }
        .feature-status.unsupported { color: #e53e3e; }
        .recommendation {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .recommendation h4 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .console-output {
            background: #1a202c;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .console-line {
            margin-bottom: 5px;
        }
        .console-timestamp {
            color: #718096;
            margin-right: 10px;
        }
        .console-method {
            color: #f56565;
            margin-right: 5px;
        }
        .console-content {
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Browser Compatibility Test</h1>
            <p>Execute the code snippet and view real-time results</p>
        </div>

        <button id="runTest" class="test-button">Run Browser Compatibility Test</button>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Running compatibility tests...</p>
        </div>

        <div id="results" class="results">
            <div class="browser-info">
                <h3>🌐 Browser Information</h3>
                <div class="info-row">
                    <span class="info-label">Browser:</span>
                    <span id="browserName" class="info-value">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Version:</span>
                    <span id="browserVersion" class="info-value">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Compatibility Score:</span>
                    <span id="compatibilityScore" class="info-value score">-</span>
                </div>
            </div>

            <div id="recommendation" class="recommendation">
                <h4>📋 Recommendation</h4>
                <p id="recommendationText">-</p>
            </div>

            <div class="features">
                <div id="featureResults"></div>
            </div>

            <div class="console-output">
                <div id="consoleLog"></div>
            </div>
        </div>
    </div>

    <script>
        // Browser Compatibility Tester Class (from your codebase)
        class BrowserCompatibilityTester {
            constructor() {
                this.timestamp = Date.now();
                this.logs = [];
            }

            log(message, method = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                this.logs.push({ timestamp, method, message });
                this.updateConsole(`${timestamp} [${method.toUpperCase()}] ${message}`);
            }

            updateConsole(message) {
                const consoleLog = document.getElementById('consoleLog');
                if (consoleLog) {
                    const line = document.createElement('div');
                    line.className = 'console-line';
                    line.innerHTML = `<span class="console-timestamp">${new Date().toLocaleTimeString()}</span><span class="console-method">[INFO]</span><span class="console-content">${message}</span>`;
                    consoleLog.appendChild(line);
                    consoleLog.scrollTop = consoleLog.scrollHeight;
                }
            }

            detectBrowser() {
                this.log('Starting browser detection...');
                const ua = typeof navigator !== 'undefined' ? navigator.userAgent : '';
                let browser = 'Unknown';
                let version = '0';

                if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) {
                    browser = 'Chrome';
                    version = (ua.match(/Chrome\/(\d+)/) || [,'0'])[1];
                } else if (/Firefox\//.test(ua)) {
                    browser = 'Firefox';
                    version = (ua.match(/Firefox\/(\d+)/) || [,'0'])[1];
                } else if (/Safari\//.test(ua) && /Version\//.test(ua)) {
                    browser = 'Safari';
                    version = (ua.match(/Version\/(\d+)/) || [,'0'])[1];
                } else if (/Edg\//.test(ua)) {
                    browser = 'Edge';
                    version = (ua.match(/Edg\/(\d+)/) || [,'0'])[1];
                }

                this.log(`Detected browser: ${browser} ${version}`);
                return { browser, version };
            }

            featureChecks() {
                this.log('Checking modern JavaScript features...');
                const checks = {
                    'ESM Modules': typeof document !== 'undefined' && 'noModule' in document.createElement('script') === false,
                    'Array.prototype.at': typeof Array.prototype.at === 'function',
                    'Array.prototype.flat': typeof Array.prototype.flat === 'function',
                    'Array.prototype.flatMap': typeof Array.prototype.flatMap === 'function',
                    'Object.fromEntries': typeof Object.fromEntries === 'function',
                    'Object.hasOwn': typeof Object.hasOwn === 'function',
                    'String.trimStart/trimEnd': (typeof ''.trimStart === 'function') && (typeof ''.trimEnd === 'function'),
                    'PerformanceObserver': typeof PerformanceObserver !== 'undefined',
                };

                Object.entries(checks).forEach(([feature, supported]) => {
                    this.log(`Feature "${feature}": ${supported ? '✓ Supported' : '✗ Not supported'}`);
                });

                return checks;
            }

            computeScore(features) {
                const values = Object.values(features);
                const supported = values.filter(Boolean).length;
                const score = Math.round((supported / values.length) * 100);
                this.log(`Compatibility score calculated: ${score}%`);
                return score;
            }

            polyfillRequirements(features) {
                const requirements = [];
                const map = {
                    'Array.prototype.at': 'Array.prototype.at',
                    'Array.prototype.flat': 'Array.prototype.flat',
                    'Array.prototype.flatMap': 'Array.prototype.flatMap',
                    'Object.fromEntries': 'Object.fromEntries',
                    'Object.hasOwn': 'Object.hasOwn',
                    'String.trimStart/trimEnd': 'String.prototype.trimStart/trimEnd',
                };
                Object.entries(features).forEach(([key, supported]) => {
                    if (!supported && map[key]) {
                        requirements.push({ feature: map[key] });
                    }
                });

                if (requirements.length > 0) {
                    this.log(`Polyfills required for: ${requirements.map(r => r.feature).join(', ')}`);
                } else {
                    this.log('No polyfills required');
                }

                return requirements;
            }

            recommendations(score) {
                let recommendation;
                if (score >= 90) {
                    recommendation = { level: 'excellent', message: 'Your browser supports modern features. No action needed.' };
                } else if (score >= 70) {
                    recommendation = { level: 'good', message: 'Good support. Consider updating for best performance.' };
                } else if (score >= 50) {
                    recommendation = { level: 'fair', message: 'Partial support. Some features may be degraded.' };
                } else {
                    recommendation = { level: 'poor', message: 'Limited support. Update browser or enable polyfills.' };
                }

                this.log(`Recommendation: ${recommendation.message}`);
                return recommendation;
            }

            generateReport() {
                this.log('Generating comprehensive compatibility report...');
                const browser = this.detectBrowser();
                const features = this.featureChecks();
                const score = this.computeScore(features);
                const compatibility = {
                    polyfillRequired: this.polyfillRequirements(features),
                };
                const recommendation = this.recommendations(score);
                const optimizations = [];
                if (score < 90) {
                    optimizations.push('Enable modern polyfills selectively');
                    optimizations.push('Update to latest stable browser version');
                }

                this.log('Report generation completed successfully!');
                this.log(`Total features checked: ${Object.keys(features).length}`);
                this.log(`Browser compatibility score: ${score}%`);

                return {
                    timestamp: this.timestamp,
                    browser,
                    features,
                    score,
                    compatibility,
                    recommendation,
                    optimizations,
                };
            }
        }

        // Main execution function
        async function runBrowserCompatibilityTest() {
            console.log('🚀 Starting Browser Compatibility Test...');
            
            // Show loading state
            document.getElementById('runTest').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').classList.remove('show');

            try {
                // Clear previous console logs
                document.getElementById('consoleLog').innerHTML = '';

                // Create tester instance
                const tester = new BrowserCompatibilityTester();
                
                // Generate report
                const results = tester.generateReport();

                // Update UI with results
                updateUIWithResults(results);

                // Show results
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').classList.add('show');

                console.log('✅ Browser Compatibility Test completed successfully!');
                console.log('📊 Results:', results);

            } catch (error) {
                console.error('❌ Test failed:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('runTest').style.display = 'block';
                
                const consoleLog = document.getElementById('consoleLog');
                const line = document.createElement('div');
                line.className = 'console-line';
                line.innerHTML = `<span class="console-timestamp">${new Date().toLocaleTimeString()}</span><span class="console-method">[ERROR]</span><span class="console-content">Test failed: ${error.message}</span>`;
                consoleLog.appendChild(line);
            }
        }

        function updateUIWithResults(results) {
            // Update browser info
            document.getElementById('browserName').textContent = results.browser.browser;
            document.getElementById('browserVersion').textContent = results.browser.version;
            
            // Update score with color coding
            const scoreElement = document.getElementById('compatibilityScore');
            scoreElement.textContent = `${results.score}%`;
            scoreElement.className = `info-value score ${results.recommendation.level}`;

            // Update recommendation
            document.getElementById('recommendationText').textContent = results.recommendation.message;

            // Update features
            const featureResults = document.getElementById('featureResults');
            featureResults.innerHTML = '';
            
            Object.entries(results.features).forEach(([feature, supported]) => {
                const featureDiv = document.createElement('div');
                featureDiv.className = 'feature';
                featureDiv.innerHTML = `
                    <span class="feature-name">${feature}</span>
                    <span class="feature-status ${supported ? 'supported' : 'unsupported'}">
                        ${supported ? '✓' : '✗'}
                    </span>
                `;
                featureResults.appendChild(featureDiv);
            });

            // Log final summary
            const consoleLog = document.getElementById('consoleLog');
            const summaryLine = document.createElement('div');
            summaryLine.className = 'console-line';
            summaryLine.innerHTML = `<span class="console-timestamp">${new Date().toLocaleTimeString()}</span><span class="console-method">[SUMMARY]</span><span class="console-content">Browser: ${results.browser.browser} ${results.browser.version} | Score: ${results.score}% | Features: ${Object.keys(results.features).filter(f => results.features[f]).length}/${Object.keys(results.features).length} supported</span>`;
            consoleLog.appendChild(summaryLine);
        }

        // Event listener
        document.getElementById('runTest').addEventListener('click', runBrowserCompatibilityTest);

        // Auto-run on page load (optional)
        window.addEventListener('load', () => {
            console.log('📝 Page loaded. Click the button to run the test.');
        });
    </script>
</body>
</html>
